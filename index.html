          <h1 style="font-size: 3em; margin-bottom: 20px; color: #2563eb;">Et Tech X - India's Leading EdTech Expo & Conference 2026</h1>
          <p style="font-size: 1.3em; color: #666; margin-bottom: 30px;">Educational and Training Resources & Tech Expo</p>

        <main style="margin-bottom: 40px;">
          <section style="margin-bottom: 40px;">
            <h2 style="font-size: 2em; margin-bottom: 20px; color: #2563eb;">About Et Tech X</h2>
            <p style="margin-bottom: 15px; font-size: 1.1em;">Et Tech X is India's premier platform for educational technology innovation. We bring together visionaries, educators, startups, and institutions to explore, exhibit, and elevate the future of learning through technology. With two flagship events annually, we've become the go-to destination for anyone passionate about transforming education through innovation.</p>
            <p style="margin-bottom: 15px; font-size: 1.1em;">Our mission is to bridge the gap between educational institutions and cutting-edge technology solutions, fostering collaboration and driving meaningful change in the education sector across India and beyond.</p>
          </section>
          
          <section style="margin-bottom: 40px;">
            <h2 style="font-size: 2em; margin-bottom: 20px; color: #2563eb;">7th Edition ET TECH X - September 2026</h2>
            <p style="margin-bottom: 15px; font-size: 1.1em;">Join us for the 7th Edition ET TECH X on September 22, 23, and 24, 2026 at Yashobhoomi, Dwaraka, New Delhi. This three-day power-packed event features awards ceremonies, exhibitions, and future-forward discussions on education technology.</p>
            <h3 style="font-size: 1.5em; margin-top: 25px; margin-bottom: 15px; color: #059669;">Event Highlights</h3>
            <ul style="margin-left: 30px; margin-bottom: 20px; font-size: 1.1em;">
              <li style="margin-bottom: 10px;"><strong>150+ EdTech Exhibitors</strong> showcasing innovative solutions</li>
              <li style="margin-bottom: 10px;"><strong>6000+ Attendees</strong> including educators, administrators, and decision-makers</li>
              <li style="margin-bottom: 10px;"><strong>20+ Cities</strong> represented from across India</li>
              <li style="margin-bottom: 10px;"><strong>Awards Ceremony</strong> recognizing excellence in EdTech</li>
              <li style="margin-bottom: 10px;"><strong>Conference Sessions</strong> with industry-leading speakers</li>
              <li style="margin-bottom: 10px;"><strong>Workshops</strong> on cutting-edge educational technologies</li>
              <li style="margin-bottom: 10px;"><strong>Expo</strong> featuring the latest EdTech products and services</li>
            </ul>
          </section>
          
          <section style="margin-bottom: 40px;">
            <h2 style="font-size: 2em; margin-bottom: 20px; color: #2563eb;">Key Offerings</h2>
            <h3 style="font-size: 1.5em; margin-top: 20px; margin-bottom: 15px; color: #059669;">Awards</h3>
            <p style="margin-bottom: 15px; font-size: 1.1em;">Recognize and celebrate excellence in educational technology. Our awards ceremony honors innovators, institutions, and solutions that are transforming the education landscape.</p>
            
            <h3 style="font-size: 1.5em; margin-top: 20px; margin-bottom: 15px; color: #059669;">Conference</h3>
            <p style="margin-bottom: 15px; font-size: 1.1em;">Engage with thought leaders, industry experts, and visionaries through keynote sessions, panel discussions, and interactive presentations covering the latest trends and innovations in EdTech.</p>
            
            <h3 style="font-size: 1.5em; margin-top: 20px; margin-bottom: 15px; color: #059669;">Workshops</h3>
            <p style="margin-bottom: 15px; font-size: 1.1em;">Hands-on learning experiences designed to equip educators and administrators with practical skills and knowledge in emerging educational technologies, including AI, VR, AR, and digital learning platforms.</p>
            
            <h3 style="font-size: 1.5em; margin-top: 20px; margin-bottom: 15px; color: #059669;">Expo</h3>
            <p style="margin-bottom: 15px; font-size: 1.1em;">Explore cutting-edge EdTech solutions from leading companies and startups. Connect with exhibitors offering learning management systems, assessment tools, virtual reality solutions, robotics, STEM kits, and more.</p>
          </section>
          
          <section style="margin-bottom: 40px;">
            <h2 style="font-size: 2em; margin-bottom: 20px; color: #2563eb;">Why Attend Et Tech X?</h2>
            <p style="margin-bottom: 15px; font-size: 1.1em;">Et Tech X provides a unique platform for networking, learning, and collaboration. Whether you're an educator looking to enhance your teaching methods, an administrator seeking innovative solutions, or an EdTech company wanting to showcase your products, ET TECH X offers unparalleled opportunities.</p>
            <p style="margin-bottom: 15px; font-size: 1.1em;">Our events have consistently attracted thousands of participants, hundreds of exhibitors, and industry leaders from across India, making it one of the most significant gatherings in the educational technology space.</p>
          </section>
          
          <section style="margin-bottom: 40px;">
            <h2 style="font-size: 2em; margin-bottom: 20px; color: #2563eb;">Registration</h2>
            <p style="margin-bottom: 15px; font-size: 1.1em;">Secure your spot at India's premier EdTech expo. Registration is now open for exhibitors, conference attendees, workshop participants, and visitors. Early registration ensures you get the best rates and access to all event features.</p>
          </section>
